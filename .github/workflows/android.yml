name: Android CI/CD

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests and Build
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: |
          test
          ${{ github.ref == 'refs/heads/master' && 'assembleDebug' || '' }}
          ${{ startsWith(github.ref, 'refs/tags/v') && 'bundleRelease' || '' }}

    - name: Sign Release AAB
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
        jarsigner -keystore release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          app/build/outputs/bundle/release/app-release.aab \
          "${{ secrets.ALIAS }}"
        rm release.jks
        echo "signed_bundle=app/build/outputs/bundle/release/app-release.aab" >> $GITHUB_OUTPUT
      id: sign_app

    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ startsWith(github.ref, 'refs/tags/v') && 'signed-app-bundle' || 'debug-apk' }}
        path: ${{ startsWith(github.ref, 'refs/tags/v') && steps.sign_app.outputs.signed_bundle || 'app/build/outputs/apk/debug/*.apk' }}
        if-no-files-found: ignore

    - name: Deploy to Google Play
      if: startsWith(github.ref, 'refs/tags/v')
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        packageName: com.paddez.wordformed
        releaseFiles: ${{ steps.sign_app.outputs.signed_bundle }}
        track: internal
        status: draft
        whatsNewDirectory: distribution/whatsnew
