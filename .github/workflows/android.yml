name: Android CI/CD

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      run: ./gradlew test

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release AAB
      run: ./gradlew bundleRelease

    - name: Sign Release AAB
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
        # Note: Bundle signing is usually done via jarsigner for AABs, then verified by apksigner
        # Modern AGP can also do this, but for a standalone CI step, jarsigner is standard for AAB.
        jarsigner -keystore release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          app/build/outputs/bundle/release/app-release.aab \
          "${{ secrets.ALIAS }}"
        
        # Clean up keystore
        rm release.jks
        
        # Set output for next steps
        echo "signed_bundle=app/build/outputs/bundle/release/app-release.aab" >> $GITHUB_OUTPUT
      id: sign_app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-app-bundle
        path: ${{ steps.sign_app.outputs.signed_bundle }}
        if-no-files-found: ignore

    - name: Deploy to Google Play
      if: startsWith(github.ref, 'refs/tags/v')
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        packageName: com.paddez.wordformed
        releaseFiles: ${{ steps.sign_app.outputs.signed_bundle }}
        track: internal
        status: draft
        whatsNewDirectory: distribution/whatsnew
